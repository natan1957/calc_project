<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מחשבון פיננסי</title>
    <link rel="stylesheet" href="fin.css">
</head>
<body>
    <div class="finance-container">
        <h2>מחשבון החזר הלוואה</h2>
        
        <label>סכום ההלוואה:</label>
        <input type="number" id="loanAmount">

        <label>ריבית שנתית (%):</label>
        <input type="number" id="interestRate" value="5">

        <label>החזר חודשי מבוקש:</label>
        <input type="number" id="monthlyPayment">

        <button class="calc-btn" onclick="calculateLoan()">חשב זמן החזר</button>

        <div class="result-box" id="result">התוצאה תופיע כאן</div>

        <div class="player-controls">
            <button onclick="playAudio()">נגן ▶️</button>
            <button onclick="pauseAudio()">השהה ⏸</button>
            <button onclick="deleteAudio()">מחק 🗑️</button>
            <button onclick="exportAudio()">ייצוא 📤</button>
        </div>

        <div class="version-tag">Version 1.0.4</div>

        <a href="../math_calc/math.html" class="nav-button">למחשבון מתמטי ⮕</a>
    </div>

    <div id="exportModal" class="modal" hidden>
        <div class="modal-content">
            <h3>בחר יעד לייצוא</h3>
            <div class="modal-buttons">
                <button onclick="processExport('disk')">💾 שמירה בשם לדיסק</button>
                <button onclick="processExport('whatsapp')">💬 שליחה בוואטסאפ</button>
                <button onclick="processExport('gmail')">📧 שליחה ב-Gmail</button>
                <button onclick="processExport('share')">📱 שיתוף מערכתי אחר</button>
                <button class="cancel-btn" onclick="closeExportModal()">ביטול</button>
            </div>
        </div>
    </div>

    <script src="../db_core.js"></script>
    <script src="../player.js"></script>
    <script src="fin.js"></script>
</body>
</html>
